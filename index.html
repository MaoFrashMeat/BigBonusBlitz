<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigBonusBlitz</title>
    <!-- ドット絵風フォント（日本語対応） -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div id="title-screen" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background: radial-gradient(circle at center, #0f3460, #1a1a2e); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div style="position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 800px; height: 800px; max-width: 90vw; max-height: 70vh;">
            <!-- 魔法陣ロゴ（ファンタジーRPG風） -->
            <img src="assets/bbb_magic_circle.png" alt="Magic Circle" style="position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: contain; animation: spin 60s linear infinite;">
            <img src="assets/bbb_text_only.png" alt="Big Bonus Blitz Text" style="position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: contain; z-index: 1; filter: drop-shadow(2px 0 0 #0f172a) drop-shadow(-2px 0 0 #0f172a) drop-shadow(0 2px 0 #0f172a) drop-shadow(0 -2px 0 #0f172a) drop-shadow(0 0 15px rgba(0,0,0,0.9));">
            
            <!-- カジュアル・ポップ風ロゴを使いたい場合はこちらをアンコメントしてください -->
            <!-- <img src="assets/bbb_logo_casual_pop.png" alt="Big Bonus Blitz Casual Pop" style="position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: contain; z-index: 1; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));"> -->
            
            <button id="btn-start-game" class="btn btn-action" style="position: absolute; bottom: 5%; font-size: 32px; padding: 15px 50px; box-shadow: 0 0 20px #e94560; animation: flash 1.5s infinite alternate; z-index: 2;">TAP TO START</button>
        </div>
    </div>
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes titlePulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(233, 69, 96, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 0 50px rgba(233, 69, 96, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(233, 69, 96, 0.4); }
        }
        @keyframes flash {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }
    </style>
    <div id="game-container">


        <!-- メイン画面：キャラとスロット -->
        <main id="main-screen">
            <!-- 液晶表示エリア -->
            <section id="character-area">
                <div id="bonus-lamp" class="lamp-off">CHANCE</div>
                
                <!-- ボーナス情報表示（左上） -->
                <div id="bonus-info" class="hidden">
                    <span class="bonus-info-label" style="font-size: 10px; color: #aaa;">残枚数</span>
                    <span id="bonus-left-count">0</span>
                </div>

                <!-- BB MODE 突入ロゴ（右下） -->
                <div id="bb-mode-logo" class="hidden">BB<br>MODE</div>
                
                <!-- BIG BONUS CUT-IN ロゴ -->
                <img src="assets/britz_bonus_logo.png" id="bb-cutin-logo" class="hidden" alt="Britz BONUS" />
                
                <!-- RB MODE 突入ロゴ（右下） -->
                <div id="rb-mode-logo" class="hidden">RB<br>MODE</div>
                
                <!-- 背景層 (遠景: 空など) -->
                <div id="lcd-layer-bg" class="lcd-layer"></div>
                <!-- 中景層 (舞台: 草原など) -->
                <div id="lcd-layer-mg" class="lcd-layer"></div>
                <!-- 前景層 (キャラ・エフェクト: 後ほど追加予定) -->
                <div id="lcd-layer-fg" class="lcd-layer"></div>
                
                <!-- キャラクター（前景） -->
                <div id="character-sprite" class="popora-idle"></div>
                <!-- 敵キャラクター（小役示唆等） -->
                <div id="enemy-img" class="enemy-goblin">
                    <!-- 敵HPバー -->
                    <div id="enemy-hp-container" style="position:absolute; top:-20px; left:50%; transform:translateX(-50%); width: 100px; height: 10px; background: #333; border: 2px solid #000; border-radius: 5px; overflow: hidden; z-index: 10;">
                        <div id="enemy-hp-fill" style="width: 100%; height: 100%; background: #0f0; transition: width 0.2s, background-color 0.2s;"></div>
                    </div>
                    <img src="assets/goblin.png" id="enemy-sprite" class="goblin-sprite" alt="Enemy Sprite" />
                    <div id="enemy-core" class="slime-core core-red" style="display: none;"></div>
                    <!-- ボコスカ砂煙（第2停止時用） -->
                    <img src="assets/dust_cloud.png" id="dust-cloud-img" class="hidden" alt="Dust Cloud" />
                </div>
                <!-- ダメージ数字表示用コンテナ -->
                <div id="damage-container" style="position: absolute; right: 25%; top: 40%; z-index: 100; pointer-events: none;"></div>
                <!-- ベル当選時 第3停止で登場する女騎士 -->
                <img src="assets/knight_win.png" id="knight-win-img" class="hidden" alt="Knight Win" />
                
                <!-- 内部ゲーム数表示（赤枠あたり） -->
                <div style="position: absolute; right: 20px; bottom: 10px; width: 150px; height: 50px; background-image: url('assets/g_display_frame.png'); background-size: 100% 100%; image-rendering: pixelated; display: flex; align-items: center; justify-content: flex-end; padding-right: 20px; box-sizing: border-box; z-index: 10;">
                    <div id="internal-game-count" style="font-size: 24px; color: #fff; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; font-family: 'DotGothic16', monospace;">0G</div>
                </div>
            </section>
            
            <!-- HPバー（クレジット表示） -->
            <div id="hp-bar-container">
                <div id="hp-bar-fill" style="width: 10%;"></div>
                <div id="hp-bar-text">HP (CREDIT): 50 / 500</div>
            </div>

            <!-- コントロールデッキ（アーケード風茶色パネル） -->
            <section id="control-deck">
                <!-- 左側：リール＆ストップボタン -->
                <div id="reels-and-buttons-container">
                    <div class="reels-container">
                        <div class="reel-wrapper">
                            <div class="reel" id="reel-left">
                                <div class="reel-strip" id="strip-left"></div>
                                <div class="reel-overlay"></div>
                            </div>
                            <div class="slip-display" id="slip-display-0" style="display:none;">-</div>
                            <button id="btn-stop-left" class="btn btn-stop" data-reel="0" disabled style="display:none;">L</button>
                        </div>
                        <div class="reel-wrapper">
                            <div class="reel" id="reel-center">
                                <div class="reel-strip" id="strip-center"></div>
                                <div class="reel-overlay"></div>
                            </div>
                            <div class="slip-display" id="slip-display-1" style="display:none;">-</div>
                            <button id="btn-stop-center" class="btn btn-stop" data-reel="1" disabled style="display:none;">C</button>
                        </div>
                        <div class="reel-wrapper">
                            <div class="reel" id="reel-right">
                                <div class="reel-strip" id="strip-right"></div>
                                <div class="reel-overlay"></div>
                            </div>
                            <div class="slip-display" id="slip-display-2" style="display:none;">-</div>
                            <button id="btn-stop-right" class="btn btn-stop" data-reel="2" disabled style="display:none;">R</button>
                        </div>
                        
                        <!-- ペイライン表示用 -->
                        <div class="payline line-top"></div>
                        <div class="payline line-center"></div>
                        <div class="payline line-bottom"></div>
                        <div class="payline line-diag-down"></div>
                        <div class="payline line-diag-up"></div>
                    </div>
                </div>

                <!-- 左下：AUTO/MAX BET -->
                <div id="left-panel" style="position: absolute; left: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px;">
                    <div id="auto-speed-panel" style="display: flex; gap: 5px; width: 120px; justify-content: space-between;">
                        <button id="btn-auto-x2" class="btn" style="flex:1; padding: 5px; font-size: 14px; font-weight: bold; background: #333; color: #fff; border: 1px solid #555; border-radius: 3px; cursor: pointer; transition: background 0.2s;">x2</button>
                        <button id="btn-auto-x3" class="btn" style="flex:1; padding: 5px; font-size: 14px; font-weight: bold; background: #333; color: #fff; border: 1px solid #555; border-radius: 3px; cursor: pointer; transition: background 0.2s;">x3</button>
                        <button id="btn-auto-x6" class="btn" style="flex:1; padding: 5px; font-size: 14px; font-weight: bold; background: #333; color: #fff; border: 1px solid #555; border-radius: 3px; cursor: pointer; transition: background 0.2s;">x6</button>
                    </div>
                    <button id="btn-auto" class="btn btn-action" style="padding: 10px; width: 120px; font-weight: bold; background: #333; border: 2px solid #555;">AUTO</button>
                    <button id="btn-maxbet" class="btn btn-action" style="padding: 10px; width: 120px; font-weight: bold; background: #e94560; border: 2px solid #fff;">MAX BET</button>
                </div>

                <!-- 右下：操作・情報パネル -->
                <aside id="side-panel" style="position: absolute; right: 20px; bottom: 20px; display: flex; gap: 15px; align-items: flex-end; background: transparent; border: none; padding: 0; box-shadow: none;">
                    <div class="info-container" style="gap:5px; background: #000; padding: 10px; border-radius: 5px; border: 2px solid #333;">
                        <div class="info-box" style="background: transparent;">
                            <span class="label" style="color: #f90;">CREDIT</span>
                            <span id="credit-display" style="font-size: 20px;">50</span>
                        </div>
                        <div class="info-box" style="background: transparent;">
                            <span class="label" style="color: #f90;">PAYOUT</span>
                            <span id="payout-display" style="font-size: 20px;">0</span>
                        </div>
                        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 2px;">
                            <span class="label" style="color: #f90; font-size: 10px; margin-right: 5px;">GAME</span>
                            <div style="width: 110px; height: 40px; background-image: url('assets/g_display_frame.png'); background-size: 100% 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 15px; position: relative; image-rendering: pixelated; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
                                <span id="g-display" style="font-size: 16px; color: #fff; font-weight: bold; text-shadow: 1px 1px 0 #000; display: block; width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right;">0G</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="sys-buttons-column" style="display:flex; flex-direction:column; gap:20px; align-items:center;">
                        <button id="btn-options" style="font-size:32px; background:transparent; border:none; box-shadow:none; cursor:pointer; padding:0; line-height:1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); transition: transform 0.1s; color: #fff;" title="Options">⚙️</button>
                        <button id="btn-bgm" style="font-size:32px; background:transparent; border:none; box-shadow:none; cursor:pointer; padding:0; line-height:1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); transition: transform 0.1s, opacity 0.2s; color: #fff; opacity: 1;" title="BGM Toggle">🎵</button>
                    </div>
                </aside>
            </section>
        </main>

        <!-- Options Modal -->
        <div id="options-modal" class="modal hidden">
            <div class="modal-content">
                <h2>OPTIONS</h2>
                <div class="options-grid" style="width:100%; display:flex; flex-direction:column; gap:20px;">
                    <div class="option-row" style="display:flex; justify-content:space-between; align-items:center; background: rgba(0,255,0,0.1); padding: 10px; border-radius: 4px; border: 1px dashed #0f0;">
                        <label style="color:#0f0; font-size:20px;">DEBUG MODE</label>
                        <input type="checkbox" id="debug-mode-toggle" style="width:24px; height:24px; cursor:pointer;">
                    </div>
                    <div class="option-row" style="display:flex; justify-content:space-between; align-items:center;">
                        <label style="color:#fff; font-size:20px;">BGM TRACK</label>
                        <select id="bgm-select" style="background:#222; color:#0f0; border:1px solid #555; padding:5px; font-size:14px; cursor: pointer; width:150px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">
                            <!-- Options will be populated by JS -->
                        </select>
                    </div>
                    <div class="option-row" style="display:flex; justify-content:space-between; align-items:center;">
                        <label style="color:#fff; font-size:20px;">BGM VOLUME</label>
                        <input type="range" id="bgm-volume-slider" min="0" max="0.2" step="0.01" value="0.1" style="width:150px; cursor:pointer;">
                    </div>
                    <div class="option-row" style="display:flex; justify-content:space-between; align-items:center;">
                        <label style="color:#fff; font-size:20px;">SE VOLUME</label>
                        <input type="range" id="se-volume-slider" min="0" max="0.2" step="0.01" value="0.1" style="width:150px; cursor:pointer;">
                    </div>
                    <div class="option-row" style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; border-top: 1px solid #555; padding-top: 20px;">
                        <label style="color:#fff; font-size:16px;">RESET GAME STATE</label>
                        <button id="btn-reset-state" class="btn btn-action" style="background: linear-gradient(180deg, #ff4c4c, #cc0000); padding:5px 15px; width:auto; font-size:14px;">RESET</button>
                    </div>
                </div>
                <button id="btn-close-options" class="btn btn-action" style="margin-top:30px; padding:10px; width:100px;">CLOSE</button>
            </div>
        </div>

        <!-- Paytable Modal -->
        <div id="paytable-modal" class="modal hidden">
            <div class="modal-content">
                <h2>PAYTABLE</h2>
                <div class="paytable-grid">
                    <div class="pay-row"><div class="pay-sym">BIG: <img src="assets/red7.png" height="16">x3 <img src="assets/blue7.png" height="16">x3 <img src="assets/bar.png" height="16">x3</div><div class="pay-val">15</div></div>
                    <div class="pay-row"><div class="pay-sym">REG: <img src="assets/red7.png" height="16"> <img src="assets/red7.png" height="16"> <img src="assets/bar.png" height="16"></div><div class="pay-val">15</div></div>
                    <div class="pay-row"><div class="pay-sym"><img src="assets/star.png"> x 3</div><div class="pay-val">10</div></div>
                    <div class="pay-row"><div class="pay-sym"><img src="assets/watermelon.png"> x 3</div><div class="pay-val">9</div></div>
                    <div class="pay-row"><div class="pay-sym"><img src="assets/cherry.png"> Left Reel</div><div class="pay-val">4</div></div>
                    <div class="pay-row"><div class="pay-sym"><img src="assets/replay.png"> x 3</div><div class="pay-val">3</div></div>
                </div>
                <button id="btn-close-paytable" class="btn btn-action" style="margin-top:20px; padding:10px; width:100px;">CLOSE</button>
            </div>
        </div>
        
        <!-- Floating Debug Popup -->
        <div id="debug-popup" class="hidden" style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.9); border: 2px solid #0f0; border-radius: 5px; padding: 15px; z-index: 10001; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 15px rgba(0,255,0,0.5);">
            <div style="font-size:16px; color:#0f0; font-weight:bold; border-bottom: 1px solid #0f0; padding-bottom: 5px; text-align: center;">DEBUG TOOLS</div>
            
            <div style="display:flex; flex-direction:column; gap: 5px;">
                <label style="color:#fff; font-size:12px;">FORCE FLAG:</label>
                <select id="debug-force-flag" style="background:#222; color:#0f0; border:1px solid #555; padding:5px; font-size:12px; cursor: pointer; width: 100%;">
                    <option value="-1">DEBUG (NORMAL)</option>
                    <option value="0">HAZE (0)</option>
                    <option value="1">BB_A (1)</option>
                    <option value="2">BB_B (2)</option>
                    <option value="3">BB_C (3)</option>
                    <option value="4">BB_D (4)</option>
                    <option value="5">RB_A (5)</option>
                    <option value="6">RB_B (6)</option>
                    <option value="7">REPLAY_A (7)</option>
                    <option value="8">REPLAY_B (8)</option>
                    <option value="9">REPLAY_C (9)</option>
                    <option value="10">BELL_A (10)</option>
                    <option value="11">BELL_B (11)</option>
                    <option value="12">BELL_C (12)</option>
                    <option value="13">CHERRY_A (13)</option>
                    <option value="14">CHERRY_B (14)</option>
                    <option value="15">CHERRY_C (15)</option>
                    <option value="16">SUICA_A (16)</option>
                    <option value="17">SUICA_B (17)</option>
                    <option value="18">SUICA_C (18)</option>
                    <option value="19">CHANCE_A (19)</option>
                    <option value="20">CHANCE_B (20)</option>
                    <option value="21">CHANCE_C (21)</option>
                </select>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label style="color:#fff; font-size:12px;">SETTING (1-6):</label>
                <select id="setting-select" style="background:#222; color:#0f0; border:1px solid #555; padding:5px; font-size:14px; cursor: pointer; font-weight: bold;">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                </select>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label style="color:#fff; font-size:12px;">ADD CREDIT:</label>
                <button id="btn-add-credit" style="background:#222; color:#0f0; border:1px solid #555; padding:2px 10px; font-size:14px; cursor: pointer; font-weight: bold; border-radius: 3px;">+50</button>
            </div>
            
            <div style="font-size:12px; color:#fff; display:flex; flex-direction:column; gap:5px; background:#111; padding:10px; border-radius:3px; border: 1px solid #333;">
                <span>RNG: <span id="debug-rng" style="color: #0f0;">-</span></span>
                <span>FLG: <span id="debug-flag" style="color: #0f0;">-</span></span>
                <span>GM: <span id="debug-game-mode" style="color: #ff0;">-</span></span>
                <span>MOD: <span id="debug-mode" style="color: #0f0;">-</span></span>
                <div style="border-top:1px solid #333; margin:3px 0;"></div>
                <span style="color:#aaa;">ROLE: <span id="debug-wfl-role" style="color:#7c3aed; font-weight:bold;">-</span></span>
                <span style="color:#aaa;">EVENT: <span id="debug-wfl-event" style="color:#f59e0b; font-weight:bold;">-</span></span>
                <span style="color:#aaa;">VAR: <span id="debug-wfl-var" style="color:#34d399; font-weight:bold;">-</span></span>
            </div>

        </div>

    </div>
    <script src="settings.js?v=2"></script>
    <script src="workflow.js?v=1"></script>
    <script>window.addEventListener('error', function(e) { fetch('http://127.0.0.1:9999/?error=' + encodeURIComponent(e.message + ' at ' + e.lineno)); });</script>
    <script src="main.js?v=2"></script>
</body>
</html>
