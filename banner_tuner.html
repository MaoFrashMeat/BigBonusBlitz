<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Banner Tuner</title>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 20px; }
        .control-group { margin-bottom: 15px; background: #2d2d2d; padding: 10px; border-radius: 5px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input[type="range"] { width: 100%; }
        .val { font-weight: bold; color: #00ffaa; margin-left: 10px; }
        button { padding: 10px; background: #00ffaa; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        textarea { width: 100%; height: 200px; margin-top: 10px; background: #333; color: #fff; }
    </style>
</head>
<body>
    <h1>帯 (Banner) チューナー</h1>
    <p>数値を変更するとゲーム画面にリアルタイム反映されます。</p>

    <div class="control-group">
        <label>テキスト内容 (Text)</label>
        <input type="text" id="b-text" value="3ゲーム以内に小役を引ければ...CHANCE!?" style="width:100%; padding:5px; background:#333; color:#fff; border:1px solid #555;">
    </div>
    <div class="control-group">
        <label>テキストのループ間隔（空白の数）</label>
        <input type="range" id="b-spacing" min="1" max="20" step="1" value="5">
        <span class="val" id="val-spacing">5</span>
    </div>
    <div class="control-group">
        <label>テキストの大きさ (Font Size)</label>
        <input type="range" id="b-font-size" min="10" max="150" step="1" value="38">
        <span class="val" id="val-font-size">38px</span>
    </div>
    <div class="control-group">
        <label>帯の色 (Color)</label>
        <input type="color" id="b-color" value="#004cff">
    </div>
    <div class="control-group">
        <label>帯の透明度 (Opacity)</label>
        <input type="range" id="b-opacity" min="0" max="1" step="0.05" value="0.75">
        <span class="val" id="val-opacity">0.75</span>
    </div>
    <div class="control-group">
        <label>帯の点滅速度 (Banner Flash Speed) - 0で点滅なし</label>
        <input type="range" id="b-flash" min="0" max="5" step="0.1" value="3.4">
        <span class="val" id="val-flash">3.4s</span>
    </div>
    <div class="control-group">
        <label>文字の点滅速度 (Text Flash Speed) - 0で点滅なし</label>
        <input type="range" id="b-text-flash" min="0" max="5" step="0.1" value="0">
        <span class="val" id="val-text-flash">0s</span>
    </div>
    <div class="control-group">
        <label>スクロール速度 (Scroll Speed) - 小さいほど速い</label>
        <input type="range" id="b-scroll" min="1" max="120" step="1" value="30">
        <span class="val" id="val-scroll">30s</span>
    </div>
    <div class="control-group">
        <label>下帯のテキストタイミングズレ (Bottom Text Delay %)</label>
        <input type="range" id="b-bottom-delay" min="0" max="100" step="1" value="50">
        <span class="val" id="val-bottom-delay">50%</span>
    </div>
    <div class="control-group">
        <label>帯の大きさ (Height)</label>
        <input type="range" id="b-height" min="10" max="150" step="1" value="50">
        <span class="val" id="val-height">50px</span>
    </div>
    <div class="control-group">
        <label>上帯のオフセット (Top Offset)</label>
        <input type="range" id="b-top" min="-100" max="500" step="1" value="-18">
        <span class="val" id="val-top">-18px</span>
    </div>
    <div class="control-group">
        <label>上帯の回転角度 (Top Rotation)</label>
        <input type="range" id="b-top-rotate" min="-90" max="90" step="1" value="-7">
        <span class="val" id="val-top-rotate">-7deg</span>
    </div>
    <div class="control-group">
        <label>下帯のオフセット (Bottom Offset)</label>
        <input type="range" id="b-bottom" min="-100" max="500" step="1" value="-4">
        <span class="val" id="val-bottom">-4px</span>
    </div>
    <div class="control-group">
        <label>下帯の回転角度 (Bottom Rotation)</label>
        <input type="range" id="b-bottom-rotate" min="-90" max="90" step="1" value="-7">
        <span class="val" id="val-bottom-rotate">-7deg</span>
    </div>
    <div class="control-group">
        <label>Z軸 (Z-index)</label>
        <input type="range" id="b-zindex" min="0" max="100" step="1" value="11">
        <span class="val" id="val-zindex">11</span>
    </div>

    <button id="btn-attach" style="background:#6366f1; color:white;">📁 style.css を紐付け</button>
    <button id="btn-save" style="background:#10b981; color:white;" disabled>💾 style.css に保存</button>
    <div id="status" style="margin-top: 10px; color: #a7f3d0; font-weight: bold;"></div>
    
    <h3>生成されたCSS (確認用)</h3>
    <textarea id="output" readonly></textarea>

    <script>
        const bc = new BroadcastChannel('banner_tuner');
        let fileHandle = null;

        const state = {
            text: '3ゲーム以内に小役を引ければ...CHANCE!?',
            spacing: 5,
            font_size: 38,
            color: '#004cff',
            opacity: 0.7,
            flash: 3.4,
            text_flash: 0,
            scroll: 220,
            bottom_delay: 50,
            height: 50,
            top: -18,
            top_rotate: -7,
            bottom: -4,
            bottom_rotate: -7,
            zindex: 11
        };

        // Load from localStorage
        try {
            const saved = localStorage.getItem('banner_tuner_state');
            if (saved) {
                const parsed = JSON.parse(saved);
                for(let k in parsed) {
                    if (parsed[k] !== undefined && parsed[k] !== null) {
                        state[k] = parsed[k];
                    }
                }
            }
        } catch(e) {}

        function bind(id, key, unit = '') {
            const el = document.getElementById(id);
            if (!el) return;
            const valEl = document.getElementById(id.replace('b-', 'val-'));
            
            if (state[key] !== undefined) {
                el.value = state[key];
                if (valEl) valEl.textContent = state[key] + unit;
            }

            el.addEventListener('input', (e) => {
                try {
                    if (id === 'b-color' || id === 'b-text') {
                        state[key] = e.target.value;
                    } else {
                        state[key] = parseFloat(e.target.value);
                    }
                    if (valEl) valEl.textContent = state[key] + unit;
                    sendUpdate();
                } catch(err) {
                    console.error("Binding error:", err);
                }
            });
        }

        bind('b-text', 'text');
        bind('b-spacing', 'spacing');
        bind('b-font-size', 'font_size', 'px');
        bind('b-color', 'color');
        bind('b-opacity', 'opacity');
        bind('b-flash', 'flash', 's');
        bind('b-text-flash', 'text_flash', 's');
        bind('b-scroll', 'scroll', 's');
        bind('b-bottom-delay', 'bottom_delay', '%');
        bind('b-height', 'height', 'px');
        bind('b-top', 'top', 'px');
        bind('b-top-rotate', 'top_rotate', 'deg');
        bind('b-bottom', 'bottom', 'px');
        bind('b-bottom-rotate', 'bottom_rotate', 'deg');
        bind('b-zindex', 'zindex');

        function generateCSS() {
            let r=0, g=0, b=0;
            if (state.color.length === 7) {
                r = parseInt(state.color.substring(1,3), 16);
                g = parseInt(state.color.substring(3,5), 16);
                b = parseInt(state.color.substring(5,7), 16);
            }
            
            // 帯の点滅は、opacity ではなく rgba(r,g,b, opacity) の色自体の変更で行う
            // そうしないと、子要素のテキストまで透明になってしまうため。
            let bgNormal = `rgba(${r}, ${g}, ${b}, ${state.opacity})`;
            let bgFlash = `rgba(${r}, ${g}, ${b}, ${Math.max(0, state.opacity - 0.5)})`;

            let css = `
/* --- BANNER_TUNER_START --- */
.enemy-banner {
    --bg-normal: ${bgNormal};
    --bg-flash: ${bgFlash};
    position: absolute;
    left: -50%;
    width: 200%;
    height: ${state.height}px;
    background: var(--bg-normal);
    color: #fff;
    font-family: 'DotGothic16', monospace;
    font-size: ${state.font_size}px;
    line-height: ${state.height}px;
    font-weight: bold;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    overflow: hidden;
    white-space: nowrap;
    z-index: ${state.zindex};
    box-shadow: 0 0 15px rgba(${r}, ${g}, ${b}, 0.8);
    display: flex;
    align-items: center;
`;
            if (state.flash > 0) css += `    animation: bannerFlash ${state.flash}s infinite alternate;\n`;
            else css += `    animation: none;\n`;
            css += `}

@keyframes bannerFlash {
    0% { background: var(--bg-normal); }
    100% { background: var(--bg-flash); }
}

#enemy-banner-top {
    top: ${state.top}px;
    transform: rotate(${state.top_rotate}deg);
}

#enemy-banner-bottom {
    bottom: ${state.bottom}px;
    transform: rotate(${state.bottom_rotate}deg);
}

.enemy-banner.hidden {
    display: none !important;
}

.banner-text {
    display: inline-block;
`;
            if (state.text_flash > 0) {
                css += `    animation: marqueeText ${state.scroll * 50}s linear infinite, textFlash ${state.text_flash}s infinite alternate;\n`;
            } else {
                css += `    animation: marqueeText ${state.scroll * 50}s linear infinite;\n`;
            }
            css += `}

#enemy-banner-bottom .banner-text {
    animation-delay: -${(state.scroll * 50 * (state.bottom_delay || 0)) / 100}s;
}

@keyframes marqueeText {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

@keyframes textFlash {
    0% { color: #fff; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
    100% { color: transparent; text-shadow: none; }
}
/* --- BANNER_TUNER_END --- */`;
            return css.trim();
        }

        function sendUpdate() {
            bc.postMessage(state);
            document.getElementById('output').value = generateCSS();
            try { localStorage.setItem('banner_tuner_state', JSON.stringify(state)); } catch(e){}
        }

        // File System Access API
        document.getElementById('btn-attach').addEventListener('click', async () => {
            try {
                const [handle] = await window.showOpenFilePicker({ types: [{ description: 'CSS', accept: {'text/css': ['.css']} }] });
                fileHandle = handle;
                document.getElementById('status').textContent = `✅ 紐付け完了: ${fileHandle.name}`;
                document.getElementById('btn-save').disabled = false;
            } catch(e) {}
        });

        document.getElementById('btn-save').addEventListener('click', async () => {
            if (!fileHandle) return;
            try {
                if ((await fileHandle.queryPermission({ mode: 'readwrite' })) !== 'granted') {
                    if ((await fileHandle.requestPermission({ mode: 'readwrite' })) !== 'granted') throw new Error('Denied');
                }
                const file = await fileHandle.getFile();
                let content = await file.text();
                
                const startMarker = "/* --- BANNER_TUNER_START --- */";
                const endMarker = "/* --- BANNER_TUNER_END --- */";
                const s = content.indexOf(startMarker);
                const e = content.indexOf(endMarker);
                
                if (s === -1 || e === -1) throw new Error("style.css にマーカーが見つかりません。");
                
                const newContent = content.substring(0, s) + generateCSS() + content.substring(e + endMarker.length);
                
                const writable = await fileHandle.createWritable();
                await writable.write(newContent);
                await writable.close();
                
                document.getElementById('status').textContent = `💾 保存完了! style.css を更新しました。`;
                setTimeout(() => document.getElementById('status').textContent = `✅ 紐付け完了: ${fileHandle.name}`, 3000);
            } catch(e) {
                alert("保存エラー: " + e.message);
            }
        });

        // Init
        sendUpdate();
    </script>
</body>
</html>
