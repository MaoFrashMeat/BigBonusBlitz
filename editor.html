<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BigBonusBlitz - Settings Editor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #16213e;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #0f3460;
            text-shadow: 0 0 5px #e94560;
            text-align: center;
            margin-top: 0;
        }
        .section-title {
            border-bottom: 2px solid #e94560;
            padding-bottom: 5px;
            margin-top: 20px;
            color: #e94560;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            padding: 8px 10px;
            border-radius: 5px;
        }
        .row label { font-size: 14px; }
        .row input {
            width: 80px;
            background: #0f3460;
            color: #fff;
            border: 1px solid #e94560;
            border-radius: 3px;
            padding: 4px;
            font-weight: bold;
            text-align: right;
        }
        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn:hover { background: #ff477e; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        
        #editor-ui { display: none; }
        #status { text-align: center; margin-top: 15px; font-size: 14px; color: #0f0; font-weight:bold; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-top: 15px;
            border-bottom: 2px solid #e94560;
            padding-bottom: 2px;
        }
        .tab-btn {
            background: #0f3460;
            color: #fff;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px 5px 0 0;
            font-weight: bold;
            opacity: 0.6;
        }
        .tab-btn.active {
            background: #e94560;
            opacity: 1;
        }
        
        /* Validation Bar */
        .validation-bar {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            background: #222;
            transition: 0.3s;
        }
        .valid { border: 2px solid #0f0; color: #0f0; }
        .invalid { border: 2px solid #f00; color: #f00; background: #500; }
        
        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 150px;
            background-color: #0f3460;
            border-left: 5px solid #0f0;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 12px 20px;
            position: fixed;
            z-index: 1000;
            right: 20px;
            top: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            transform: translateX(120%);
            transition: transform 0.3s ease-out, visibility 0.3s;
        }
        #toast.show {
            visibility: visible;
            transform: translateX(0);
        }
    </style>
    <script src="settings.js"></script>
</head>
<body>

    <div class="container">
        <h1>⚙️ 設定エディタ</h1>
        
        <div style="display:flex; justify-content:center; gap:10px;">
            <button id="btn-open" class="btn" style="background:#0f3460; font-size:12px; width:auto;">📂 ファイル紐付け設定</button>
            <button id="btn-save" class="btn" style="font-size:14px; width:auto; flex:1;">💾 コードを上書き保存する</button>
        </div>
        <div id="status"></div>

        <div id="editor-ui">
            <div class="main-tabs" id="main-tabs" style="display:flex; gap:10px; margin-top:10px; margin-bottom:20px; border-bottom:2px solid #ff477e; justify-content:center;">
                <button class="main-tab-btn active" data-target="tab-prob" style="background:#ff477e; color:#fff; border:none; padding:10px 20px; cursor:pointer; border-radius:5px 5px 0 0; font-weight:bold; font-size:16px;">基本 / 確率設定</button>
                <button class="main-tab-btn" data-target="tab-reel" style="background:#0f3460; color:#fff; border:none; padding:10px 20px; cursor:pointer; border-radius:5px 5px 0 0; font-weight:bold; font-size:16px;">リール配列設定</button>
            </div>
            
            <div id="tab-prob" class="tab-content active" style="display:block;">
                <div style="display:flex; gap:20px; margin-top:20px;">
                <div style="flex:1;">
                    <h3 class="section-title">払い出し枚数（共通）</h3>
                    <div class="row"><label>ビッグボーナス</label><input type="number" id="payoutBig" class="payout-input"></div>
                    <div class="row"><label>レギュラーボーナス</label><input type="number" id="payoutReg" class="payout-input"></div>
                    <div class="row"><label>星（ベル）</label><input type="number" id="payoutStar" class="payout-input"></div>
                    <div class="row"><label>スイカ</label><input type="number" id="payoutWatermelon" class="payout-input"></div>
                    <div class="row"><label>チェリー</label><input type="number" id="payoutCherry" class="payout-input"></div>
                </div>
                <div style="flex:1;">
                    <h3 class="section-title">タイミング（ミリ秒）</h3>
                    <div class="row"><label>第1リール待機</label><input type="number" id="timeAutoReel1"></div>
                    <div class="row"><label>第2リール待機</label><input type="number" id="timeAutoReel2"></div>
                    <div class="row"><label>第3リール待機</label><input type="number" id="timeAutoReel3"></div>
                    <div class="row"><label>次ゲーム待機</label><input type="number" id="timeAutoNext"></div>
                    <div class="row"><label>当選表示待機</label><input type="number" id="timeAutoNextWin"></div>
                </div>
            </div>

            <h3 class="section-title" style="margin-top:30px;">確率設定（各役の当選数 / 16384）</h3>
            <div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom: 2px solid #e94560; padding-bottom: 2px; margin-top: 15px;">
                <div class="tabs" id="tabs" style="border-bottom:none; margin-top:0; padding-bottom:0;">
                    <button class="tab-btn active" data-setting="1">設定 1</button>
                    <button class="tab-btn" data-setting="2">設定 2</button>
                    <button class="tab-btn" data-setting="3">設定 3</button>
                    <button class="tab-btn" data-setting="4">設定 4</button>
                    <button class="tab-btn" data-setting="5">設定 5</button>
                    <button class="tab-btn" data-setting="6">設定 6</button>
                </div>
                <div style="display:flex; gap:5px; margin-bottom: 2px;">
                    <button id="btn-copy-setting" class="btn" style="background:#007bff; margin-top:0; padding:4px 10px; font-size:16px; width:auto;" title="コピー">📄</button>
                    <button id="btn-paste-setting" class="btn" style="background:#28a745; margin-top:0; padding:4px 10px; font-size:16px; width:auto;" disabled title="貼り付け">📋</button>
                </div>
            </div>
            
            <style> .desc-span { font-size:12px; color:#aaa; font-family:monospace; text-align:right; width: 110px; } </style>
            <div id="prob-container" style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 0 0 5px 5px;">
                <div class="row" style="background: rgba(255,0,0,0.1); margin-bottom: 15px;">
                    <label>ハズレ (自動計算)</label>
                    <div style="display:flex; align-items:center; gap:10px;"><span id="descHAZE" class="desc-span"></span><input type="number" class="prob-input" id="probHAZE" readonly style="background:#333; color:#aaa; border-color:#555;"></div>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr; gap: 5px;">
                    <div>
                        <h4 style="margin:5px 0; color:#e94560;">ボーナス</h4>
                        <div class="row"><label>BB_A (赤7揃い)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descBB_A" class="desc-span"></span><input type="number" class="prob-input" id="probBB_A"></div></div>
                        <div class="row"><label>BB_B (青7揃い)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descBB_B" class="desc-span"></span><input type="number" class="prob-input" id="probBB_B"></div></div>
                        <div class="row"><label>BB_C (BAR揃い中)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descBB_C" class="desc-span"></span><input type="number" class="prob-input" id="probBB_C"></div></div>
                        <div class="row"><label>BB_D (青赤青中)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descBB_D" class="desc-span"></span><input type="number" class="prob-input" id="probBB_D"></div></div>
                        <div class="row"><label>RB_A (赤赤BAR)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descRB_A" class="desc-span"></span><input type="number" class="prob-input" id="probRB_A"></div></div>
                        <div class="row"><label>RB_B (青青BAR)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descRB_B" class="desc-span"></span><input type="number" class="prob-input" id="probRB_B"></div></div>
                        
                        <h4 style="margin:10px 0 5px 0; color:#e94560;">リプレイ</h4>
                        <div class="row"><label>REPLAY_A (上段)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descREPLAY_A" class="desc-span"></span><input type="number" class="prob-input" id="probREPLAY_A"></div></div>
                        <div class="row"><label>REPLAY_B (斜め)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descREPLAY_B" class="desc-span"></span><input type="number" class="prob-input" id="probREPLAY_B"></div></div>
                        <div class="row"><label>REPLAY_C (下段)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descREPLAY_C" class="desc-span"></span><input type="number" class="prob-input" id="probREPLAY_C"></div></div>
                    </div>
                    <div>
                        <h4 style="margin:5px 0; color:#e94560;">ベル (STAR)</h4>
                        <div class="row"><label>BELL_A (上/斜)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descBELL_A" class="desc-span"></span><input type="number" class="prob-input" id="probBELL_A"></div></div>
                        <div class="row"><label>BELL_B (中段)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descBELL_B" class="desc-span"></span><input type="number" class="prob-input" id="probBELL_B"></div></div>
                        <div class="row"><label>BELL_C (下段)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descBELL_C" class="desc-span"></span><input type="number" class="prob-input" id="probBELL_C"></div></div>
                        
                        <h4 style="margin:10px 0 5px 0; color:#e94560;">チェリー</h4>
                        <div class="row"><label>CHERRY_A (角)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descCHERRY_A" class="desc-span"></span><input type="number" class="prob-input" id="probCHERRY_A"></div></div>
                        <div class="row"><label>CHERRY_B (右中ボ)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descCHERRY_B" class="desc-span"></span><input type="number" class="prob-input" id="probCHERRY_B"></div></div>
                        <div class="row"><label>CHERRY_C (中段)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descCHERRY_C" class="desc-span"></span><input type="number" class="prob-input" id="probCHERRY_C"></div></div>
                        
                        <h4 style="margin:10px 0 5px 0; color:#e94560;">スイカ / チャンス</h4>
                        <div class="row"><label>SUICA_A (上/斜)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descSUICA_A" class="desc-span"></span><input type="number" class="prob-input" id="probSUICA_A"></div></div>
                        <div class="row"><label>SUICA_B (中段)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descSUICA_B" class="desc-span"></span><input type="number" class="prob-input" id="probSUICA_B"></div></div>
                        <div class="row"><label>SUICA_C (下段)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descSUICA_C" class="desc-span"></span><input type="number" class="prob-input" id="probSUICA_C"></div></div>
                        <div class="row"><label>CHANCE_A (ス外れ)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descCHANCE_A" class="desc-span"></span><input type="number" class="prob-input" id="probCHANCE_A"></div></div>
                        <div class="row"><label>CHANCE_B (チ外れ)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descCHANCE_B" class="desc-span"></span><input type="number" class="prob-input" id="probCHANCE_B"></div></div>
                        <div class="row"><label>CHANCE_C (リプV)</label><div style="display:flex; align-items:center; gap:10px;"><span id="descCHANCE_C" class="desc-span"></span><input type="number" class="prob-input" id="probCHANCE_C"></div></div>
                    </div>
                </div>
                
                <div class="validation-bar" id="validation-bar">
                    合計: 0 / 16384
                </div>
            </div>
            </div> <!-- end tab-prob -->
            
            <div id="tab-reel" class="tab-content" style="display:none;">
                <h3 class="section-title">リール図柄配列（1〜21コマ）</h3>
                <p style="font-size:12px; color:#aaa;">※「4コマ滑り」を考慮し、小役（リプレイ・ベル等）は5コマ以上離れないように配置してください。</p>
                <div id="reel-warning" style="display:none; color:#ffaa00; font-size:14px; margin-top:15px; background:rgba(255, 170, 0, 0.2); padding:10px; border-radius:5px; border:1px solid #ffaa00;"></div>
                <div id="reel-grid" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:15px; margin-top:10px;">
                    <!-- JS generated -->
                </div>
            </div> <!-- end tab-reel -->
            
        </div>
    </div>
    
    <div id="toast">Message</div>

    <script>
        // IndexedDB wrapper for FileHandle caching
        const idb = {
            async open() {
                return new Promise((resolve) => {
                    const req = indexedDB.open('EditorDB', 1);
                    req.onupgradeneeded = e => e.target.result.createObjectStore('store');
                    req.onsuccess = e => resolve(e.target.result);
                });
            },
            async get(key) {
                const db = await this.open();
                return new Promise((resolve) => {
                    const tx = db.transaction('store', 'readonly');
                    const req = tx.objectStore('store').get(key);
                    req.onsuccess = () => resolve(req.result);
                });
            },
            async set(key, val) {
                const db = await this.open();
                return new Promise((resolve) => {
                    const tx = db.transaction('store', 'readwrite');
                    tx.objectStore('store').put(val, key);
                    tx.oncomplete = resolve;
                });
            }
        };

        const SUB_FLAGS = [
            'BB_A', 'BB_B', 'BB_C', 'BB_D',
            'RB_A', 'RB_B',
            'REPLAY_A', 'REPLAY_B', 'REPLAY_C',
            'BELL_A', 'BELL_B', 'BELL_C',
            'CHERRY_A', 'CHERRY_B', 'CHERRY_C',
            'SUICA_A', 'SUICA_B', 'SUICA_C',
            'CHANCE_A', 'CHANCE_B', 'CHANCE_C'
        ];

        let fileHandle;
        let currentConfig = typeof CONFIG !== 'undefined' ? CONFIG : {
            payouts: { BIG: 300, REG: 90, STAR: 8, WATERMELON: 6, CHERRY: 4 },
            timings: { reel1: 1400, reel2: 300, reel3: 300, next: 800, nextWin: 1000 },
            probabilities: {
                1: { HAZE: 16384 }, 2: { HAZE: 16384 }, 3: { HAZE: 16384 },
                4: { HAZE: 16384 }, 5: { HAZE: 16384 }, 6: { HAZE: 16384 }
            },
            reelStrips: [
                ['WATERMELON', 'RED7', 'REPLAY', 'WATERMELON', 'STAR', 'REPLAY', 'STAR', 'STAR', 'BLUE7', 'WATERMELON', 'STAR', 'REPLAY', 'CHERRY', 'REPLAY', 'STAR', 'BAR', 'WATERMELON', 'REPLAY', 'WATERMELON', 'CHERRY', 'STAR'],
                ['STAR', 'RED7', 'CHERRY', 'WATERMELON', 'REPLAY', 'STAR', 'CHERRY', 'REPLAY', 'STAR', 'STAR', 'BAR', 'CHERRY', 'REPLAY', 'STAR', 'CHERRY', 'BLUE7', 'WATERMELON', 'REPLAY', 'STAR', 'CHERRY', 'REPLAY'],
                ['CHERRY', 'RED7', 'WATERMELON', 'STAR', 'REPLAY', 'WATERMELON', 'BLUE7', 'REPLAY', 'STAR', 'BAR', 'WATERMELON', 'CHERRY', 'REPLAY', 'STAR', 'WATERMELON', 'BLUE7', 'REPLAY', 'STAR', 'WATERMELON', 'STAR', 'REPLAY']
            ]
        };
        if (!currentConfig.reelStrips) {
            currentConfig.reelStrips = [
                ['WATERMELON', 'RED7', 'REPLAY', 'WATERMELON', 'STAR', 'REPLAY', 'STAR', 'STAR', 'BLUE7', 'WATERMELON', 'STAR', 'REPLAY', 'CHERRY', 'REPLAY', 'STAR', 'BAR', 'WATERMELON', 'REPLAY', 'WATERMELON', 'CHERRY', 'STAR'],
                ['STAR', 'RED7', 'CHERRY', 'WATERMELON', 'REPLAY', 'STAR', 'CHERRY', 'REPLAY', 'STAR', 'STAR', 'BAR', 'CHERRY', 'REPLAY', 'STAR', 'CHERRY', 'BLUE7', 'WATERMELON', 'REPLAY', 'STAR', 'CHERRY', 'REPLAY'],
                ['CHERRY', 'RED7', 'WATERMELON', 'STAR', 'REPLAY', 'WATERMELON', 'BLUE7', 'REPLAY', 'STAR', 'BAR', 'WATERMELON', 'CHERRY', 'REPLAY', 'STAR', 'WATERMELON', 'BLUE7', 'REPLAY', 'STAR', 'WATERMELON', 'STAR', 'REPLAY']
            ];
        }
        
        let activeSetting = 1;
        let clipboardSetting = null;

        const btnOpen = document.getElementById('btn-open');
        const btnSave = document.getElementById('btn-save');
        const editorUi = document.getElementById('editor-ui');
        const statusEl = document.getElementById('status');
        const validationBar = document.getElementById('validation-bar');
        const toastEl = document.getElementById('toast');
        let toastTimeout;
        
        function showToast(msg, isError = false) {
            toastEl.textContent = msg;
            toastEl.style.borderLeftColor = isError ? '#f00' : '#0f0';
            toastEl.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2000);
        }

        const SYMBOL_OPTIONS = ['RED7', 'BLUE7', 'BAR', 'STAR', 'WATERMELON', 'CHERRY', 'REPLAY', 'BLANK'];
        const REEL_NAMES = ['リールC (左)', 'リールB (中)', 'リールA (右)'];
        
        function loadReelsUI() {
            const grid = document.getElementById('reel-grid');
            grid.innerHTML = '';
            
            for (let r = 0; r < 3; r++) {
                const col = document.createElement('div');
                col.style.background = 'rgba(255,255,255,0.05)';
                col.style.padding = '10px';
                col.style.borderRadius = '5px';
                col.innerHTML = '<h4 style="margin:0 0 10px 0; color:#e94560; text-align:center;">' + REEL_NAMES[r] + '</h4>';
                
                for (let i = 0; i < 21; i++) {
                    const row = document.createElement('div');
                    row.style.display = 'flex';
                    row.style.justifyContent = 'space-between';
                    row.style.alignItems = 'center';
                    row.style.margin = '4px 0';
                    row.style.fontSize = '14px';
                    row.innerHTML = '<label>' + (i+1) + 'コマ</label>';
                    
                    const sel = document.createElement('select');
                    sel.style.background = '#0f3460';
                    sel.style.color = '#fff';
                    sel.style.border = '1px solid #e94560';
                    sel.style.borderRadius = '3px';
                    sel.style.padding = '2px';
                    sel.style.width = '110px';
                    
                    for (const sym of SYMBOL_OPTIONS) {
                        const opt = document.createElement('option');
                        opt.value = sym;
                        opt.textContent = sym;
                        sel.appendChild(opt);
                    }
                    
                    sel.value = currentConfig.reelStrips[r][i] || 'BLANK';
                    sel.addEventListener('change', (e) => {
                        currentConfig.reelStrips[r][i] = e.target.value;
                        validateReels();
                    });
                    
                    row.appendChild(sel);
                    col.appendChild(row);
                }
                grid.appendChild(col);
            }
            validateReels();
        }
        
        function validateReels() {
            const warningEl = document.getElementById('reel-warning');
            let warnings = [];
            
            // Replay and Bell/Star must be pullable within 4 frames (max distance 5)
            const checkSymbols = ['REPLAY', 'STAR'];
            
            for (let r = 0; r < 3; r++) {
                const strip = currentConfig.reelStrips[r];
                for (const targetSym of checkSymbols) {
                    let indices = [];
                    for (let i = 0; i < 21; i++) {
                        if (strip[i] === targetSym) indices.push(i);
                    }
                    
                    if (indices.length === 0) {
                        warnings.push(REEL_NAMES[r] + ' に ' + targetSym + ' が一つもありません。');
                        continue;
                    }
                    
                    for (let j = 0; j < indices.length; j++) {
                        const nextIdx = (j + 1) % indices.length;
                        let gap = indices[nextIdx] - indices[j];
                        if (gap <= 0) gap += 21; // wrap around
                        
                        if (gap > 5) {
                            warnings.push(REEL_NAMES[r] + ' の ' + targetSym + ' の間隔が ' + (gap-1) + ' コマ空いている箇所があります。（4コマ滑りでは取りこぼす位置が存在します）');
                            break; 
                        }
                    }
                }
            }
            
            if (warnings.length > 0) {
                warningEl.style.display = 'block';
                warningEl.innerHTML = '<strong>⚠️ 配置警告</strong><br>' + warnings.join('<br>');
            } else {
                warningEl.style.display = 'none';
            }
        }

        window.addEventListener('load', async () => {
            
            document.querySelectorAll('.main-tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.main-tab-btn').forEach(b => {
                        b.style.background = '#0f3460';
                        b.classList.remove('active');
                    });
                    document.querySelectorAll('.tab-content').forEach(c => {
                        c.style.display = 'none';
                        c.classList.remove('active');
                    });
                    
                    e.target.style.background = '#ff477e';
                    e.target.classList.add('active');
                    
                    const targetId = e.target.dataset.target;
                    const targetEl = document.getElementById(targetId);
                    targetEl.style.display = 'block';
                    targetEl.classList.add('active');
                });
            });

            loadCommonUI();
            loadSettingUI(1);
            loadReelsUI();
            editorUi.style.display = 'block';

            const savedHandle = await idb.get('settingsFileHandle');
            if (savedHandle) {
                fileHandle = savedHandle;
                btnOpen.textContent = '🔄 紐付け済み';
                btnOpen.style.background = '#0a0';
            }
        });

        btnOpen.addEventListener('click', async () => {
            try {
                [fileHandle] = await window.showOpenFilePicker({
                    types: [{ description: 'JavaScript Files', accept: {'text/javascript': ['.js']} }]
                });
                await idb.set('settingsFileHandle', fileHandle);
                statusEl.textContent = 'ファイルが紐付けられました！以後はファイル選択不要です。';
                statusEl.style.color = '#0ff';
                btnOpen.textContent = `🔄 紐付け済み`;
                btnOpen.style.background = '#0a0';
            } catch (e) { console.error(e); }
        });
        
        function loadCommonUI() {
            document.getElementById('payoutBig').value = currentConfig.payouts.BIG;
            document.getElementById('payoutReg').value = currentConfig.payouts.REG;
            document.getElementById('payoutStar').value = currentConfig.payouts.STAR;
            document.getElementById('payoutWatermelon').value = currentConfig.payouts.WATERMELON;
            document.getElementById('payoutCherry').value = currentConfig.payouts.CHERRY;
            
            document.getElementById('timeAutoReel1').value = currentConfig.timings.reel1;
            document.getElementById('timeAutoReel2').value = currentConfig.timings.reel2;
            document.getElementById('timeAutoReel3').value = currentConfig.timings.reel3;
            document.getElementById('timeAutoNext').value = currentConfig.timings.next;
            document.getElementById('timeAutoNextWin').value = currentConfig.timings.nextWin;
        }

        function loadSettingUI(settingNum) {
            activeSetting = settingNum;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.setting) === settingNum);
            });
            
            const p = currentConfig.probabilities[settingNum];
            document.getElementById('probHAZE').value = p.HAZE;
            for (let f of SUB_FLAGS) {
                const el = document.getElementById('prob' + f);
                if (el) el.value = p[f] || 0;
            }
            
            validateTotal();
        }
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                saveCurrentSettingInputs();
                loadSettingUI(parseInt(e.target.dataset.setting));
            });
        });
        
        const btnCopy = document.getElementById('btn-copy-setting');
        const btnPaste = document.getElementById('btn-paste-setting');
        
        btnCopy.addEventListener('click', () => {
            saveCurrentSettingInputs();
            clipboardSetting = JSON.parse(JSON.stringify(currentConfig.probabilities[activeSetting]));
            btnPaste.disabled = false;
            showToast(`設定 ${activeSetting} の数値をコピーしました`);
        });
        
        btnPaste.addEventListener('click', () => {
            if (!clipboardSetting) return;
            currentConfig.probabilities[activeSetting] = JSON.parse(JSON.stringify(clipboardSetting));
            loadSettingUI(activeSetting);
            showToast(`設定 ${activeSetting} に貼り付けました`);
        });
        
        document.querySelectorAll('.prob-input').forEach(input => {
            input.addEventListener('input', validateTotal);
        });
        document.querySelectorAll('.payout-input').forEach(input => {
            input.addEventListener('input', validateTotal);
        });
        
        function saveCurrentSettingInputs() {
            let p = { HAZE: parseInt(document.getElementById('probHAZE').value, 10) || 0 };
            for (let f of SUB_FLAGS) {
                const el = document.getElementById('prob' + f);
                p[f] = el ? (parseInt(el.value, 10) || 0) : 0;
            }
            currentConfig.probabilities[activeSetting] = p;
        }

        function formatProb(val) {
            if (!val || val <= 0) return '0.00% (1/0.0)';
            const pct = ((val / 16384) * 100).toFixed(2);
            const denom = (16384 / val).toFixed(1);
            return `${pct}% (1/${denom})`;
        }

        function validateTotal() {
            let otherTotal = 0;
            for (let f of SUB_FLAGS) {
                const el = document.getElementById('prob' + f);
                const val = el ? (parseInt(el.value, 10) || 0) : 0;
                otherTotal += val;
                const desc = document.getElementById('desc' + f);
                if (desc) desc.textContent = formatProb(val);
            }
            
            const haze = 16384 - otherTotal;
            document.getElementById('probHAZE').value = haze;
            document.getElementById('descHAZE').textContent = formatProb(haze);
            
            const payoutBig = parseInt(document.getElementById('payoutBig').value, 10) || 0;
            const payoutReg = parseInt(document.getElementById('payoutReg').value, 10) || 0;
            const payoutStar = parseInt(document.getElementById('payoutStar').value, 10) || 0;
            const payoutWatermelon = parseInt(document.getElementById('payoutWatermelon').value, 10) || 0;
            const payoutCherry = parseInt(document.getElementById('payoutCherry').value, 10) || 0;
            
            let expectedOut = 0;
            for (let f of SUB_FLAGS) {
                const val = parseInt(document.getElementById('prob' + f).value, 10) || 0;
                if (f.startsWith('REPLAY')) expectedOut += val * 3;
                else if (f.startsWith('CHERRY')) expectedOut += val * payoutCherry;
                else if (f.startsWith('SUICA') || f.startsWith('CHANCE')) expectedOut += val * payoutWatermelon;
                else if (f.startsWith('BELL')) expectedOut += val * payoutStar;
                else if (f.startsWith('BB')) expectedOut += val * payoutBig;
                else if (f.startsWith('RB')) expectedOut += val * payoutReg;
            }
            
            const rtp = (expectedOut / (16384 * 3)) * 100;
            
            if (haze < 0) {
                validationBar.className = 'validation-bar invalid';
                validationBar.textContent = `エラー: 小役の合計が 16384 を ${Math.abs(haze)} オーバーしています！`;
                btnSave.disabled = true;
            } else {
                validationBar.className = 'validation-bar valid';
                validationBar.textContent = `合計: 16384 / 16384 ｜ 推定機械割: ${rtp.toFixed(2)}%`;
                btnSave.disabled = false;
            }
        }

        function generateCode() {
            saveCurrentSettingInputs();
            const copyConfig = JSON.parse(JSON.stringify(currentConfig));
            let code = '// パラメータ設定 (CONFIG)\n// このファイルはエディターツールによって自動更新されます\n';
            code += 'let CONFIG = ' + JSON.stringify(copyConfig, null, 4) + ';\n';
            return code;
        }

        btnSave.addEventListener('click', async () => {
            if (!fileHandle) {
                statusEl.textContent = '❌ まず「ファイル紐付け設定」ボタンを押して settings.js を選択してください。';
                statusEl.style.color = '#f00';
                return;
            }
            
            try {
                if ((await fileHandle.queryPermission({ mode: 'readwrite' })) !== 'granted') {
                    if ((await fileHandle.requestPermission({ mode: 'readwrite' })) !== 'granted') {
                        throw new Error('Permission denied');
                    }
                }
                
                currentConfig.payouts.BIG = parseInt(document.getElementById('payoutBig').value, 10);
                currentConfig.payouts.REG = parseInt(document.getElementById('payoutReg').value, 10);
                currentConfig.payouts.STAR = parseInt(document.getElementById('payoutStar').value, 10);
                currentConfig.payouts.WATERMELON = parseInt(document.getElementById('payoutWatermelon').value, 10);
                currentConfig.payouts.CHERRY = parseInt(document.getElementById('payoutCherry').value, 10);
                
                currentConfig.timings.reel1 = parseInt(document.getElementById('timeAutoReel1').value, 10);
                currentConfig.timings.reel2 = parseInt(document.getElementById('timeAutoReel2').value, 10);
                currentConfig.timings.reel3 = parseInt(document.getElementById('timeAutoReel3').value, 10);
                currentConfig.timings.next = parseInt(document.getElementById('timeAutoNext').value, 10);
                currentConfig.timings.nextWin = parseInt(document.getElementById('timeAutoNextWin').value, 10);

                const newCode = generateCode();

                // 書き込み
                const writable = await fileHandle.createWritable();
                await writable.write(newCode);
                await writable.close();

                showToast('保存しました');

            } catch (e) {
                console.error(e);
                showToast('保存に失敗しました', true);
            }
        });
    </script>
</body>
</html>
